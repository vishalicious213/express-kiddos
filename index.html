<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Los Kiddos</title>
    </head>    
    <body>
        <h1>Los Kiddos</h1>
        <button>Click Me!</button>
        <div>
            <img id="kidpic" src="" alt="">
        </div>

        <script>
            const button = document.querySelector('button')
            const img = document.querySelector('#kidpic')

            button.addEventListener('click', () => {
                fetch('/img')
                    .then(response => response.json())
                    .then(data => {
                        img.src = data.imgUrl
                        img.alt = data.imgUrl
                    })
            })
        </script>
    </body>
</html>
